name: internal-maintenance-management

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: internal-maintenance-sqlserver-dev
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "${SQLSERVER_PORT}:1433"
    volumes:
      - internal_sqlserver_data_dev:/var/opt/mssql
    mem_limit: 3072m
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  internal_sqlserver_data_dev: