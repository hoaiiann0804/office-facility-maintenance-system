name: Backend CI

on:
  push:
    paths:
      - "InternalMaintenance.Api/**"
      - "InternalMaintenanceManagement.slnx"
  pull_request:
    paths:
      - "InternalMaintenance.Api/**"
      - "InternalMaintenanceManagement.slnx"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Restore, build, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            InternalMaintenanceManagement.slnx
            InternalMaintenance.Api/InternalMaintenance.Api.csproj

      - name: Restore dependencies
        run: dotnet restore InternalMaintenanceManagement.slnx

      - name: Build Release
        run: dotnet build InternalMaintenanceManagement.slnx --configuration Release --no-restore

      - name: Publish Release
        run: dotnet publish InternalMaintenance.Api/InternalMaintenance.Api.csproj --configuration Release --no-build --output ${{ github.workspace }}/artifacts/backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: artifacts/backend
          if-no-files-found: error
          retention-days: 7
